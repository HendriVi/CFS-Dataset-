name: Report dataset release workflow status

on:
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Show latest dataset release and assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view --repo "$GITHUB_REPOSITORY" --json name,tagName,url,isLatest,publishedAt,assets

      - name: Show final build status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run view 29844128041 --repo "$GITHUB_REPOSITORY" --json databaseId,status,conclusion,headSha,url,createdAt,updatedAt
