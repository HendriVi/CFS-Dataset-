name: Validate analysis workspace

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Compile pipeline scripts
        run: python -m py_compile scripts/*.py
      - name: Parse committed harmonized files
        run: python scripts/validate_files.py --root .
      - name: Run starter analysis
        run: python scripts/quickstart_analysis.py
